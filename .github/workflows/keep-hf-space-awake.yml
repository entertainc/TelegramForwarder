name: Keep HF Space Awake

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

concurrency:
  group: keep-hf-space-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SPACE_HEALTH_URL: https://entertainc-tg-forwarder.hf.space/health
      HF_KEEPALIVE_TOKEN: ${{ secrets.HF_KEEPALIVE_TOKEN }}
    steps:
      - name: Ping Space health endpoint
        shell: bash
        run: |
          set -euo pipefail

          curl_args=(
            --fail
            --silent
            --show-error
            --location
            --max-time 45
            --retry 3
            --retry-delay 10
            --retry-all-errors
          )

          if [[ -n "${HF_KEEPALIVE_TOKEN}" ]]; then
            curl_args+=(-H "Authorization: Bearer ${HF_KEEPALIVE_TOKEN}")
          fi

          curl "${curl_args[@]}" "${SPACE_HEALTH_URL}"
          echo
